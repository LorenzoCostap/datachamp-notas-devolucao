name: Validar documentação

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validar-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar se README existe
        run: test -f README.md

      - name: Verificar se README não está vazio
        run: test -s README.md

      - name: Verificar título principal
        run: grep -q "# Datachamp - Notas de Devolução" README.md
