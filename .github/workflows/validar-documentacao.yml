name: Validar documentação

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar README
        run: |
          test -f README.md
          test -s README.md
          grep -q "Datachamp - Notas de Devolução" README.md
